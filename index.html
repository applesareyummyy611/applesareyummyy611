<!DOCTYPE html>
<html>
<head>
    <title>Car Driving Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Choose Your Car 🏎️</h1>

<div class="car-container">
    <img src="https://hips.hearstapps.com/hmg-prod/images/2026-chevrolet-corvette-zr1x-28-69971dc90285c.jpg?resize=2048:*"
         onclick="startGame('corvette')">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQDtc60lPDfV9yfL2yLsIQP4sjlEjm-l3D3Q&s:*"
         onclick="startGame('lambo')">
</div>

<!-- GAME AREA -->
<div id="gameArea">
    <img id="playerCar">
</div>

<script>
let car = document.getElementById("playerCar");
let x = 200;
let y = 200;

// track keys being held
let keys = {};

// when key is pressed
document.addEventListener("keydown", function(e) {
    keys[e.key] = true;
});

// when key is released
document.addEventListener("keyup", function(e) {
    keys[e.key] = false;
});

// smooth game loop
function gameLoop() {
    if (keys["ArrowUp"]) y -= 5;
    if (keys["ArrowDown"]) y += 5;
    if (keys["ArrowLeft"]) x -= 5;
    if (keys["ArrowRight"]) x += 5;

    car.style.top = y + "px";
    car.style.left = x + "px";

    requestAnimationFrame(gameLoop);
}

// start loop immediately
gameLoop();

// start game when car is selected
function startGame(choice) {
    document.querySelector(".car-container").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    if (choice === "corvette") {
        car.src = "https://hips.hearstapps.com/hmg-prod/images/2026-chevrolet-corvette-zr1x-28-69971dc90285c.jpg?resize=2048:*";
    } else {
        car.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQDtc60lPDfV9yfL2yLsIQP4sjlEjm-l3D3Q&s:*";
    }
}
</script>

</body>
</html>
