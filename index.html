<!DOCTYPE html>
<html>
<head>
    <title>CHAOS DRIVE 9000</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu">
    <h1>CHAOS DRIVE 9000 😤</h1>
    <button onclick="startGame()">START</button>
</div>

<div id="game">
    <div id="score">Score: 0</div>

    <div id="gameArea">
        <img id="player"
        src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
    </div>
</div>

<script>
let player = document.getElementById("player");
let gameArea = document.getElementById("gameArea");
let scoreEl = document.getElementById("score");

let x = 300, y = 300;
let keys = {};
let speed = 5;
let score = 0;
let gameRunning = false;

// start game
function startGame() {
    if (gameRunning) return;
    gameRunning = true;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    spawnStuff();
    gameLoop();
}

// key tracking
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// main loop
function gameLoop() {
    let currentSpeed = keys["Shift"] ? 10 : speed;

    if (keys["ArrowUp"]) y -= currentSpeed;
    if (keys["ArrowDown"]) y += currentSpeed;
    if (keys["ArrowLeft"]) x -= currentSpeed;
    if (keys["ArrowRight"]) x += currentSpeed;

    // boundaries
    let maxX = gameArea.clientWidth - player.clientWidth;
    let maxY = gameArea.clientHeight - player.clientHeight;

    if (x < 0) x = 0;
    if (y < 0) y = 0;
    if (x > maxX) x = maxX;
    if (y > maxY) y = maxY;

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollisions();
    chaosMode();

    requestAnimationFrame(gameLoop);
}

// spawn coins + obstacles
function spawnStuff() {
    setInterval(() => {
        let coin = document.createElement("img");
        coin.src = "https://cdn-icons-png.flaticon.com/512/138/138292.png";
        coin.className = "coin";

        coin.style.top = Math.random() * (gameArea.clientHeight - 40) + "px";
        coin.style.left = Math.random() * (gameArea.clientWidth - 40) + "px";

        gameArea.appendChild(coin);
    }, 1500);

    setInterval(() => {
        let obs = document.createElement("img");
        obs.src = "https://cdn-icons-png.flaticon.com/512/565/565547.png";
        obs.className = "obstacle";

        obs.style.top = Math.random() * (gameArea.clientHeight - 40) + "px";
        obs.style.left = Math.random() * (gameArea.clientWidth - 40) + "px";

        gameArea.appendChild(obs);
    }, 2000);
}

// collision detection
function checkCollisions() {
    document.querySelectorAll(".coin").forEach(c => {
        if (isColliding(player, c)) {
            c.remove();
            score += 10;
            scoreEl.innerText = "Score: " + score;
        }
    });

    document.querySelectorAll(".obstacle").forEach(o => {
        if (isColliding(player, o)) {
            alert("GAME OVER 😭 Score: " + score);
            location.reload();
        }
    });
}

function isColliding(a, b) {
    let r1 = a.getBoundingClientRect();
    let r2 = b.getBoundingClientRect();

    return !(r1.right < r2.left ||
             r1.left > r2.right ||
             r1.bottom < r2.top ||
             r1.top > r2.bottom);
}

// random chaos effect
function chaosMode() {
    if (Math.random() < 0.01) {
        document.body.style.background =
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";

        document.body.style.transform =
            "translate(" + (Math.random()*10-5) + "px," + (Math.random()*10-5) + "px)";
    }
}
</script>

</body>
</html>
